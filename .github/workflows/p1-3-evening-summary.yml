name: P1-4 夜サマリ → #life-summary

on:
  schedule:
    - cron: '0 12 * * *'    # 21:00 JST (UTC+9)
  workflow_dispatch:

# 必要な GitHub Secrets:
#   SLACK_BOT_TOKEN          — xoxb- で始まる Bot トークン
#   P13_SLACK_CHANNEL_ID     — life-summary チャンネル ID
#   LIFE_OWNER_SLACK_ID      — メンション先の Slack ユーザー ID

jobs:
  evening-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Run life-summary
        env:
          SLACK_BOT_TOKEN:               ${{ secrets.SLACK_BOT_TOKEN }}
          LIFE_SUMMARY_SLACK_CHANNEL_ID: ${{ secrets.P13_SLACK_CHANNEL_ID }}
          LIFE_OWNER_SLACK_ID:           ${{ secrets.LIFE_OWNER_SLACK_ID }}
          LIFE_SUMMARY_VAULT:            ${{ github.workspace }}
        run: |
          bash "05_Life/50_AI自動化/scripts/life-summary.sh"
